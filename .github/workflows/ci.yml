name: Android CI

on:
  pull_request:
    types: [ opened, synchronize, reopened ]
  push:
    branches: [ "master" ]

jobs:
  # 1. Separate Lint Job: Shows up as its own status check
  lint:
    name: ktlint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e

      - name: Run ktlint
        run: ./gradlew ktlintCheck

  # 2. Build & Test Job
  build:
    name: Build and Test
    # Only run the expensive build/sonar steps if linting passes
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e

      - name: Run ktlint
        run: ./gradlew ktlintCheck

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Generate Kover report
        run: ./gradlew koverXmlReport

      - name: Coverage check (80% gate)
        run: ./gradlew coverageCheck

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          files: app/build/reports/kover/report.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

      - name: SonarQube Scan
        if: github.event_name == 'pull_request'
        run: >
          ./gradlew sonar 
          -Dsonar.pullrequest.key=$PR_NUMBER
          -Dsonar.pullrequest.branch=$PR_BRANCH
          -Dsonar.pullrequest.base=$PR_BASE
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.head_ref }}
          PR_BASE: ${{ github.base_ref }}